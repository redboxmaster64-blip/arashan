<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Аптека Арашан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-capsules"></i></div>
            <h1>Арашан</h1>
        </div>
        <h2>Создать аккаунт</h2>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Имя пользователя *</label>
                <input type="text" id="username" required placeholder="ivan123">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required placeholder="ivan@example.com">
            </div>
            <div class="form-group">
                <label>Полное имя</label>
                <input type="text" id="fullName" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="phone" placeholder="+996 (XXX) XXX-XXX">
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="password" required placeholder="Минимум 6 символов">
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            <div class="form-group">
                <label>Подтверждение пароля *</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-register">Зарегистрироваться</button>
        </form>
        
        <div class="login-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
