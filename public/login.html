<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Аптека Арашан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-capsules"></i>
            </div>
            <h1>Арашан</h1>
            <p>Аптека №463</p>
        </div>
        <h2>Вход в аккаунт</h2>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Имя пользователя или Email</label>
                <input type="text" id="usernameOrEmail" required placeholder="admin или admin@arashan.kg">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="••••••">
            </div>
            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" id="rememberMe"> Запомнить меня
                </label>
                <a href="#" style="color:#2a7f62; text-decoration:none;">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn-login">Войти</button>
        </form>
        
        <div class="register-link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
